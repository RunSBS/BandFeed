spring:
  application:
    name: eureka-server
  config:
    import: optional:configserver:http://localhost:8888

server:
  port: 8761

eureka:
  client:
    register-with-eureka: false # 자기 자신을 다른 유레카에 등록하지 않음
    fetch-registry: false       # 다른 유레카로부터 레지스트리 정보를 가져오지 않음
  server:
    enable-self-preservation: false

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

