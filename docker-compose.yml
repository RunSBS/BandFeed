x-java-tz: &java-tz
  TZ: Asia/Seoul
  JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul

x-common-service: &common-service
  depends_on:
    eureka-server:
      condition: service_healthy
    config-server:
      condition: service_healthy
    mysql:
      condition: service_healthy
  networks:
    - bandfeed-network

services:

  # ─────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: bandfeed-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    env_file:
      - .env
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - bandfeed-network

  redis:
    image: redis:7-alpine
    container_name: bandfeed-redis
    ports:
      - "${SPRING_DATA_REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - bandfeed-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: bandfeed-kafka
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_PROCESS_ROLES: broker, controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: O9r3FldJQ3CbTqv1-OQibg
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - bandfeed-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: bandfeed-kafka-ui
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - bandfeed-network

  # ─────────────────────────────────────────
  # Spring Cloud
  # ─────────────────────────────────────────

  eureka-server:
    build:
      context: .
      dockerfile: apps/eureka-server/Dockerfile
    container_name: bandfeed-eureka
    ports:
      - "${EUREKA_SERVER_PORT}:8761"
    environment:
      <<: *java-tz
      SERVER_PORT: 8761
      EUREKA_INSTANCE_PREFERIPADDRESS: "true"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bandfeed-network

  config-server:
    build:
      context: .
      dockerfile: apps/config-server/Dockerfile
    container_name: bandfeed-config
    ports:
      - "${CONFIG_SERVER_PORT}:8888"
    environment:
      <<: *java-tz
      SERVER_PORT: 8888
      CONFIG_GIT_URI: ${CONFIG_GIT_URI}
      CONFIG_GIT_BRANCH: ${CONFIG_GIT_BRANCH}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bandfeed-network

  gateway-service:
    build:
      context: .
      dockerfile: apps/gateway-service/Dockerfile
    container_name: bandfeed-gateway
    ports:
      - "${GATEWAY_SERVER_PORT}:8000"
    environment:
      <<: *java-tz
      SERVER_PORT: 8000
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - bandfeed-network

  # ─────────────────────────────────────────
  # Application Services
  # ─────────────────────────────────────────

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    container_name: bandfeed-user
    ports:
      - "${USER_SERVER_PORT}:9010"
    environment:
      <<: *java-tz
      SERVER_PORT: 9000
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_USER_DB}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
    <<: *common-service

  band-service:
    build:
      context: .
      dockerfile: apps/band-service/Dockerfile
    container_name: bandfeed-band
    ports:
      - "${BAND_SERVER_PORT}:9020"
    environment:
      <<: *java-tz
      SERVER_PORT: 9020
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_BAND_DB}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
    <<: *common-service

  wiki-service:
    build:
      context: .
      dockerfile: apps/wiki-service/Dockerfile
    container_name: bandfeed-wiki
    ports:
      - "${WIKI_SERVER_PORT}:9030"
    environment:
      <<: *java-tz
      SERVER_PORT: 9030
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_WIKI_DB}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
    <<: *common-service

  chat-service:
    build:
      context: .
      dockerfile: apps/chat-service/Dockerfile
    container_name: bandfeed-chat
    ports:
      - "${CHAT_SERVER_PORT}:9040"
    environment:
      <<: *java-tz
      SERVER_PORT: 9040
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_CHAT_DB}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
    <<: *common-service

  # ─────────────────────────────────────────
  # Monitoring
  # ─────────────────────────────────────────

  zipkin:
    image: openzipkin/zipkin:3
    container_name: bandfeed-zipkin
    profiles: [ "monitoring" ]
    ports:
      - "${ZIPKIN_PORT}:9411"
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9411/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - bandfeed-network

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: bandfeed-prometheus
    profiles: [ "monitoring" ]
    environment:
      - TZ=Asia/Seoul
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml
      - ./monitoring/prometheus/alert-rules.yaml:/etc/prometheus/alert-rules.yaml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--storage.tsdb.retention.time=14d'
    restart: unless-stopped
    networks:
      - bandfeed-network

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: bandfeed-alertmanager
    profiles: [ "monitoring" ]
    ports:
      - "${ALERTMANAGER_PORT}:9093"
    environment:
      - TZ=Asia/Seoul
      - SLACK_ALERTMANAGER_WEBHOOK_URL=${SLACK_ALERTMANAGER_WEBHOOK_URL}
      - WEBHOOK_SHARED_SECRET=${WEBHOOK_SHARED_SECRET}
    volumes:
      - ./monitoring/alertmanager/alertmanager.yaml:/etc/alertmanager/alertmanager.yaml
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - 'sed "s|\$${SLACK_ALERTMANAGER_WEBHOOK_URL}|$$SLACK_ALERTMANAGER_WEBHOOK_URL|g; s|\$${WEBHOOK_SHARED_SECRET}|$$WEBHOOK_SHARED_SECRET|g" /etc/alertmanager/alertmanager.yaml > /tmp/am.yaml && /bin/alertmanager --config.file=/tmp/am.yaml'
    restart: unless-stopped
    networks:
      - bandfeed-network

  grafana:
    image: grafana/grafana:11.1.0
    container_name: bandfeed-grafana
    profiles: [ "monitoring" ]
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - TZ=Asia/Seoul
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    env_file:
      - .env
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - bandfeed-network

  loki:
    image: grafana/loki:2.9.8
    container_name: bandfeed-loki
    profiles: [ "monitoring" ]
    environment:
      - TZ=Asia/Seoul
    ports:
      - "${LOKI_PORT}:3100"
    volumes:
      - ./monitoring/loki/loki.yaml:/etc/loki/loki.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/loki.yaml
    restart: unless-stopped
    networks:
      - bandfeed-network

  promtail:
    image: grafana/promtail:3.1.0
    container_name: bandfeed-promtail
    profiles: [ "monitoring" ]
    environment:
      - TZ=Asia/Seoul
      - DOCKER_API_VERSION=1.44
    volumes:
      - ./monitoring/promtail/promtail.yaml:/etc/promtail/promtail.yaml
      - /var/run/docker.sock:/var/run/docker.sock
      - promtail-positions:/tmp
    command: -config.file=/etc/promtail/promtail.yaml
    restart: unless-stopped
    depends_on:
      - loki
    networks:
      - bandfeed-network

volumes:
  mysql-data:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:
  promtail-positions:

networks:
  bandfeed-network:
    driver: bridge
