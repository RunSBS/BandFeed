global:
  resolve_timeout: 5m
  slack_api_url: ${SLACK_ALERTMANAGER_WEBHOOK_URL}

route:
  group_by: [ alertname ]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: slack

receivers:
  - name: slack
    slack_configs:
      - channel: '#alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
