global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alert-rules.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [ localhost:9090 ]

  - job_name: eureka-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ eureka-server:8761 ]

  - job_name: config-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ config-server:8888 ]

  - job_name: gateway-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ gateway-service:8000 ]

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ user-service:9000 ]

  - job_name: band-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ band-service:9020 ]

  - job_name: wiki-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ wiki-service:9030 ]

  - job_name: chat-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ chat-service:9040 ]
