name: BandFeed CD

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 707578706487.dkr.ecr.ap-northeast-2.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push all service images
        run: |
          SERVICES="eureka-server config-server gateway-service user-service band-service wiki-service chat-service"
          for SERVICE in $SERVICES; do
            echo "::group::Build & Push $SERVICE"
            docker build \
              --platform linux/amd64 \
              -f apps/$SERVICE/Dockerfile \
              -t $ECR_REGISTRY/bandfeed/$SERVICE:$IMAGE_TAG \
              -t $ECR_REGISTRY/bandfeed/$SERVICE:latest \
              .
            docker push $ECR_REGISTRY/bandfeed/$SERVICE:$IMAGE_TAG
            docker push $ECR_REGISTRY/bandfeed/$SERVICE:latest
            echo "::endgroup::"
          done

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-northeast-2 | \
              docker login --username AWS --password-stdin 707578706487.dkr.ecr.ap-northeast-2.amazonaws.com

            cd ~/bandfeed

            docker compose -f docker-compose.prod.yml pull

            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            docker image prune -f

            echo "=== 배포 완료 ==="
            docker compose -f docker-compose.prod.yml ps
