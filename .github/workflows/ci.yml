name: BandFeed CI

on:
  pull_request:
    branches: [ "main", "dev" ]
  push:
    branches: [ "main", "dev" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew build

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/test'

  flyway-check:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: bandfeed
          MYSQL_PASSWORD: bandfeed1234!
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create service databases
        run: mysql -h127.0.0.1 -uroot -proot < mysql/init/01-init.sql

      - name: Run Flyway migrations against MySQL
        run: |
          for service in user-service band-service wiki-service chat-service; do
            db_name="${service%-service}_db"
            echo "::group::Flyway migrate - $service ($db_name)"
            ./gradlew ":apps:${service}:flywayMigrate" \
              -PflywayUrl="jdbc:mysql://127.0.0.1:3306/${db_name}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true" \
              -PflywayUser=bandfeed \
              -PflywayPassword="bandfeed1234!"
            echo "::endgroup::"
          done
